# GlubLM multi-agent dataset generation team
#
# Four agents coordinate via the orchestrator (data_gen/orchestrator.py).
# Each agent's system prompt is in data_gen/prompts/{name}.md.

agents:
  generator:
    model: claude-haiku-4-5-20251001
    max_tokens: 4096
    temperature: 1.0
    prompt: prompts/generator.md
    batch_size: 50           # samples per API call
    description: Generates JSON batches of single-turn conversations

  critic:
    model: claude-sonnet-4-6
    max_tokens: 2048
    temperature: 0.2
    prompt: prompts/critic.md
    description: Filters out off-persona or low-quality samples

  diversifier:
    model: claude-haiku-4-5-20251001
    max_tokens: 1024
    temperature: 0.7
    prompt: prompts/diversifier.md
    trigger_every: 1000      # samples between diversity audits
    description: Periodically audits vocabulary diversity

  persona_guardian:
    model: claude-sonnet-4-6
    max_tokens: 1024
    temperature: 0.0
    prompt: prompts/persona_guardian.md
    description: Hard filter for forbidden tokens and persona drift

budget:
  max_usd: 100.0              # hard cap for the whole phase
  warn_at_usd: 60.0
