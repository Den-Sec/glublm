# GlubLM training topics
#
# Two groups:
#   1. goldfish_physical - the goldfish's literal embodied world
#   2. ted_lasso_wisdom  - optimism / kindness / forgiveness filtered
#                          through goldfish naivete, ZERO football refs
#
# Each topic is either a plain string or an object {name, hint}
# where hint guides the generator agent toward the right tone.

