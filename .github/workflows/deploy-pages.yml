name: deploy-pages

on:
  push:
    branches: [master, main]
    paths:
      - "web/**"
      - "desk-pet/**"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Stage pages root
        run: |
          mkdir -p _site
          cp -r web/. _site/
          mkdir -p _site/desk-pet
          cp -r desk-pet/. _site/desk-pet/
          # Remove dev-only files from desk-pet deploy
          rm -rf _site/desk-pet/tools
          ls -la _site/
          ls -la _site/desk-pet/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_site"
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
