<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GlubLM Desk Pet - adopt a goldfish in your browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="description" content="A 36M-parameter goldfish LLM that forgets you after 96 tokens. Runs entirely in your browser as an installable PWA - no backend, no accounts, no tracking. Adopt the fish." />
  <meta name="theme-color" content="#ff8b3d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Glub" />

  <!-- Open Graph (Facebook, LinkedIn, Discord, iMessage, Slack, WhatsApp, Telegram) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://den-sec.github.io/glublm/desk-pet/" />
  <meta property="og:title" content="GlubLM Desk Pet - adopt a goldfish in your browser" />
  <meta property="og:description" content="A 36M-parameter goldfish LLM that forgets you after 96 tokens. Runs entirely in your browser as an installable PWA - no backend, no accounts, no tracking. Adopt the fish." />
  <meta property="og:image" content="https://den-sec.github.io/glublm/desk-pet/assets/screenshots/hero-chat.png" />
  <meta property="og:image:width" content="2296" />
  <meta property="og:image:height" content="1304" />
  <meta property="og:image:alt" content="A pixel-art goldfish in a fishbowl saying 'this. this water. this bowl. this life. it's everything to me.'" />
  <meta property="og:site_name" content="GlubLM" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@DenSec" />
  <meta name="twitter:creator" content="@DenSec" />
  <meta name="twitter:title" content="GlubLM Desk Pet - adopt a goldfish in your browser" />
  <meta name="twitter:description" content="A 36M-param goldfish LLM that forgets you after 96 tokens. Browser-based PWA, fully offline, zero backend." />
  <meta name="twitter:image" content="https://den-sec.github.io/glublm/desk-pet/assets/screenshots/hero-chat.png" />
  <meta name="twitter:image:alt" content="A pixel-art goldfish saying a philosophical line in a GBA-style bowl" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="icon" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
</head>
<body>
  <canvas id="bowl"></canvas>

  <div id="loading">
    <div class="loading-box">
      <p id="load-status">adopting goldfish...</p>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p class="loading-hint">first visit downloads the fish (40 MB). subsequent visits are instant.</p>
    </div>
  </div>

  <div id="chat-input" class="hidden">
    <input id="prompt" type="text" placeholder="say something to the goldfish..." autocomplete="off" disabled />
    <button id="send" type="button" disabled>&gt;</button>
  </div>

  <button id="settings-btn" class="hidden" type="button" aria-label="settings">&#9881;</button>

  <div id="settings-panel" class="hidden">
    <div class="settings-box">
      <h3>settings</h3>
      <label>
        <span>notifications</span>
        <select id="notif-freq">
          <option value="0">off</option>
          <option value="2">gentle (2/day)</option>
          <option value="4">normal (4/day)</option>
          <option value="8">chatty (8/day)</option>
        </select>
      </label>
      <label>
        <span>fish name</span>
        <input id="fish-name" type="text" placeholder="glub" maxlength="16" />
      </label>
      <div class="settings-footer">
        <a href="https://github.com/Den-Sec/glublm" target="_blank">about</a>
        <button id="settings-close" type="button">done</button>
      </div>
    </div>
  </div>

  <div id="install-banner" class="hidden">
    <span>adopt this goldfish?</span>
    <button id="install-btn" type="button">install</button>
    <button id="install-dismiss" type="button">not now</button>
  </div>

  <div id="ios-install-banner" class="hidden">
    <span>to adopt: tap <strong>Share</strong> &#xFEFF;&#x2B06;&#xFE0E; then <strong>Add to Home Screen</strong></span>
    <button id="ios-install-dismiss" type="button">got it</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
